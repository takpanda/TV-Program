<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>週間テレビ番組表</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #edf1f5;
      --surface:      #ffffff;
      --header-bg:    #f6f8fa;
      --border:       #c8d2dc;
      --border-light: #e6eaee;
      --text:         #1c2128;
      --text-sub:     #54606a;
      --text-muted:   #8c959f;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic UI', sans-serif;
      min-height: 100vh;
      font-size: 12px;
    }

    /* ── App Header ── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 300;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    .app-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .date-label {
      font-size: 11px;
      color: var(--text-sub);
    }

    /* ── Channel Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px 12px;
      padding: 6px 16px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
    }

    .legend-label {
      font-size: 10px;
      color: var(--text-muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-sub);
    }

    .legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Schedule wrapper ── */
    .schedule-wrapper {
      overflow-x: auto;
      padding: 10px 10px 40px;
    }

    /* ── Main flex container ── */
    .schedule-flex {
      display: flex;
    }

    /* ── Time Column ── */
    .time-col-wrap {
      width: 46px;
      flex-shrink: 0;
      position: sticky;
      left: 0;
      z-index: 100;
      background: var(--bg);
    }

    .time-col-spacer { height: 36px; }

    .time-col {
      position: relative;
      border-right: 1px solid var(--border);
    }

    .time-tick {
      position: absolute;
      right: 4px;
      transform: translateY(-50%);
      user-select: none;
      text-align: right;
      line-height: 1;
    }

    .time-tick.hour-mark {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-sub);
    }

    .time-tick.half-mark {
      font-size: 9px;
      color: var(--text-muted);
    }

    /* ── Day Columns ── */
    .day-col-wrap {
      flex: 0 0 calc((100vw - 66px) / 4);
      min-width: 0;
      padding: 0 1px;
    }

    .day-header {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
      color: #fff;
      letter-spacing: 0.05em;
      border-radius: 3px 3px 0 0;
    }

    .day-header.today {
      position: relative;
    }

    .day-header.today::after {
      content: '今日';
      position: absolute;
      bottom: 2px;
      right: 6px;
      font-size: 8px;
      font-weight: 600;
      opacity: 0.85;
      letter-spacing: 0;
    }

    .day-body {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      overflow: hidden;
    }

    .day-body.today {
      background: #fafcff;
    }

    .day-body.wknd {
      background: #fffaf8;
    }

    /* ── Grid Lines ── */
    .grid-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      pointer-events: none;
    }
    .grid-line.hour { background: var(--border); }
    .grid-line.half { background: var(--border-light); }

    /* ── Current Time Indicator ── */
    .current-time-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: #cf222e;
      z-index: 20;
      pointer-events: none;
    }
    .current-time-line::before {
      content: '';
      position: absolute;
      left: 0;
      top: -3px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #cf222e;
    }

    /* ── Program Card ── */
    .program-card {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-left: 3px solid transparent;
      border-radius: 0 2px 2px 0;
      padding: 2px 4px 2px 5px;
      overflow: hidden;
      cursor: default;
      transition: background .12s, box-shadow .12s;
    }

    .program-card:hover {
      background: #f0f4fc;
      box-shadow: 0 2px 10px rgba(0,0,0,.14);
      z-index: 50;
    }

    .prog-start {
      font-size: 9px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 1px;
    }

    .prog-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      word-break: break-all;
    }

    .prog-ch {
      display: inline-block;
      margin-top: 2px;
      padding: 1px 4px;
      border-radius: 2px;
      font-size: 9px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
    }

    .prog-memo {
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 1px;
      font-style: italic;
    }

    /* ── Error Box ── */
    .error-box {
      margin: 48px auto;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid #cf222e;
      border-radius: 6px;
      padding: 28px 32px;
      text-align: center;
    }
    .error-box h2 { font-size: 15px; color: #cf222e; margin-bottom: 10px; }
    .error-box p  { font-size: 12px; color: var(--text-sub); line-height: 1.7; }
    .error-box code {
      display: block;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 13px;
      color: #0969da;
      margin: 10px 0;
    }
    .error-box a { color: #0969da; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="app-title" id="app-title">週間テレビ番組表</div>
  <div class="date-label" id="date-label"></div>
</header>

<div id="legend-wrap"></div>

<div class="schedule-wrapper">
  <div class="schedule-flex" id="schedule-flex"></div>
</div>

<script>
"use strict";

/* ── Constants ── */
const SLOT_PX  = 48;   // px per 30-minute slot
const DAYS     = ['月','火','水','木','金','土','日'];
const WKND_SET = new Set(['土','日']);

/* Day header colors — distinct per day like channel colors in reference */
const DAY_COLORS = {
  '月': '#1565c0',   /* blue        */
  '火': '#c62828',   /* red         */
  '水': '#2e7d32',   /* green       */
  '木': '#e65100',   /* deep-orange */
  '金': '#6a1b9a',   /* purple      */
  '土': '#0277bd',   /* light-blue  */
  '日': '#b71c1c',   /* dark-red    */
};

/* ── Helpers ── */
function getTodayDay() {
  return ['日','月','火','水','木','金','土'][new Date().getDay()];
}

function getNowMinutes() {
  const d = new Date();
  return d.getHours() * 60 + d.getMinutes();
}

function toMins(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function fmtHHMM(mins) {
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function el(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

/**
 * Greedy interval-graph coloring with per-cluster totalCols.
 * Returns [{ col, totalCols }] for each program in input order.
 */
function assignColumns(progs) {
  if (!progs.length) return [];

  const n      = progs.length;
  const cols   = new Array(n).fill(0);
  const starts = progs.map(p => toMins(p.startTime));
  const ends   = progs.map(p => toMins(p.endTime));

  const parent = Array.from({length: n}, (_, i) => i);
  function find(x) { return parent[x] === x ? x : (parent[x] = find(parent[x])); }
  function union(x, y) { parent[find(x)] = find(y); }

  for (let i = 0; i < n; i++)
    for (let j = i+1; j < n; j++)
      if (starts[i] < ends[j] && starts[j] < ends[i]) union(i, j);

  const groups = {};
  for (let i = 0; i < n; i++) {
    const r = find(i);
    (groups[r] = groups[r] || []).push(i);
  }

  const totalColsMap = new Array(n).fill(1);
  for (const members of Object.values(groups)) {
    const sorted = [...members].sort((a, b) => starts[a] - starts[b]);
    for (const i of sorted) {
      const used = new Set();
      for (const j of members)
        if (j !== i && starts[i] < ends[j] && starts[j] < ends[i]) used.add(cols[j]);
      let c = 0;
      while (used.has(c)) c++;
      cols[i] = c;
    }
    const maxC = Math.max(...members.map(i => cols[i]), 0);
    members.forEach(i => { totalColsMap[i] = maxC + 1; });
  }

  return progs.map((_, i) => ({ col: cols[i], totalCols: totalColsMap[i] }));
}

/* ── Main builder ── */
function buildSchedule(data) {
  const { settings, channels, programs } = data;
  const startH     = settings.startHour   ?? 18;
  const endH       = settings.endHour     ?? 25;
  const slotMins   = settings.slotMinutes ?? 30;
  const startMin   = startH * 60;
  const endMin     = endH   * 60;
  const totalSlots = (endMin - startMin) / slotMins;
  const totalPx    = totalSlots * SLOT_PX;

  /* Page title */
  const titleStr = settings.title || '週間テレビ番組表';
  document.getElementById('app-title').textContent = titleStr;
  document.title = titleStr;

  /* Date label */
  const d = new Date();
  document.getElementById('date-label').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${getTodayDay()}）`;

  /* Channel map */
  const chMap = Object.fromEntries(channels.map(c => [c.id, c]));

  /* Legend */
  document.getElementById('legend-wrap').innerHTML =
    `<div class="legend">
      <span class="legend-label">チャンネル :</span>
      ${channels.map(c =>
        `<div class="legend-item">
          <div class="legend-dot" style="background:${escHtml(c.color)}"></div>
          <span>${escHtml(c.name)}</span>
        </div>`
      ).join('')}
    </div>`;

  const flex   = document.getElementById('schedule-flex');
  flex.innerHTML = '';
  const today  = getTodayDay();
  const nowMin = getNowMinutes();
  const todayIdx   = DAYS.indexOf(today);
  const orderedDays = todayIdx >= 0
    ? [...DAYS.slice(todayIdx), ...DAYS.slice(0, todayIdx)]
    : DAYS;

  /* ── Time column ── */
  const tcWrap = el('div', 'time-col-wrap');
  tcWrap.appendChild(el('div', 'time-col-spacer'));

  const tc = el('div', 'time-col');
  tc.style.height = totalPx + 'px';

  for (let i = 0; i <= totalSlots; i++) {
    const mins = startMin + i * slotMins;
    const isHr = (mins % 60 === 0);
    const tick = el('div', 'time-tick ' + (isHr ? 'hour-mark' : 'half-mark'));
    tick.style.top = (i * SLOT_PX) + 'px';
    tick.textContent = isHr ? String(Math.floor(mins / 60)) : '30';
    tc.appendChild(tick);
  }
  tcWrap.appendChild(tc);
  flex.appendChild(tcWrap);

  /* ── Day columns ── */
  orderedDays.forEach(day => {
    const isToday  = day === today;
    const isWknd   = WKND_SET.has(day);
    const dayColor = DAY_COLORS[day] || '#607d8b';
    /* Brighten today's header slightly */
    const hdrBg = isToday
      ? dayColor
      : (isWknd ? dayColor + 'cc' : dayColor + 'dd');

    const wrap = el('div', 'day-col-wrap');

    /* Header */
    const hdr = el('div', 'day-header' + (isToday ? ' today' : ''));
    hdr.style.background  = hdrBg;
    hdr.textContent = day + '曜';
    if (isToday) hdr.style.boxShadow = `inset 0 -3px 0 rgba(255,255,255,0.35)`;
    wrap.appendChild(hdr);

    /* Body */
    const bodyCls = 'day-body' + (isToday ? ' today' : '') + (isWknd ? ' wknd' : '');
    const body = el('div', bodyCls);
    body.style.height = totalPx + 'px';
    if (isToday) body.style.borderColor = dayColor;

    /* Grid lines */
    for (let i = 0; i <= totalSlots; i++) {
      const line = el('div', 'grid-line ' + (i % 2 === 0 ? 'hour' : 'half'));
      line.style.top = (i * SLOT_PX) + 'px';
      body.appendChild(line);
    }

    /* Current time line (today only) */
    if (isToday && nowMin >= startMin && nowMin <= endMin) {
      const ctl = el('div', 'current-time-line');
      ctl.style.top = ((nowMin - startMin) / slotMins * SLOT_PX) + 'px';
      body.appendChild(ctl);
    }

    /* Programs */
    const dayProgs = programs
      .filter(p => p.day === day)
      .filter(p => toMins(p.endTime) > startMin && toMins(p.startTime) < endMin)
      .sort((a, b) => toMins(a.startTime) - toMins(b.startTime));

    const colInfo = assignColumns(dayProgs);

    dayProgs.forEach((prog, idx) => {
      const s   = Math.max(toMins(prog.startTime), startMin);
      const e   = Math.min(toMins(prog.endTime),   endMin);
      const top = (s - startMin) / slotMins * SLOT_PX;
      const ht  = (e - s)        / slotMins * SLOT_PX - 2;

      const { col, totalCols } = colInfo[idx];
      const wPct = 100 / totalCols;
      const lPct = col * wPct;

      const ch = chMap[prog.channel] || { name: prog.channel, color: '#8c959f' };

      const card = el('div', 'program-card');
      card.style.top              = top + 'px';
      card.style.height           = ht  + 'px';
      card.style.left             = lPct + '%';
      card.style.width            = `calc(${wPct}% - 2px)`;
      card.style.borderLeftColor  = ch.color;
      card.title =
        `${prog.title}\n${prog.startTime}〜${prog.endTime}  ${ch.name}` +
        (prog.memo ? `\n📝 ${prog.memo}` : '');

      let inner = `<div class="prog-start">${escHtml(fmtHHMM(toMins(prog.startTime)))}</div>`;
      inner    += `<div class="prog-title">${escHtml(prog.title)}</div>`;
      if (ht >= 26) {
        inner += `<span class="prog-ch" style="background:${escHtml(ch.color)}">${escHtml(ch.name)}</span>`;
      }
      if (prog.memo && ht >= 40) {
        inner += `<div class="prog-memo">${escHtml(prog.memo)}</div>`;
      }
      card.innerHTML = inner;

      body.appendChild(card);
    });

    wrap.appendChild(body);
    flex.appendChild(wrap);
  });
}

/* ── Boot ── */
fetch('programs.json')
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status} — programs.json を取得できません`);
    return r.json();
  })
  .then(buildSchedule)
  .catch(err => {
    document.getElementById('schedule-flex').innerHTML =
      `<div class="error-box">
        <h2>データを読み込めませんでした</h2>
        <p>このファイルはローカルサーバー経由で開く必要があります。<br>
        ターミナルで以下を実行してください:</p>
        <code>python3 -m http.server 8000</code>
        <p>起動後、<a href="http://localhost:8000">http://localhost:8000</a> にアクセスしてください。</p>
        <p style="margin-top:12px;font-size:11px;color:#8c959f">詳細: ${escHtml(err.message)}</p>
      </div>`;
  });
</script>
</body>
</html>
