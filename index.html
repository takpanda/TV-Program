<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>週間テレビ番組表</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header">
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="app-title" id="app-title">週間テレビ番組表</div>
    <div class="date-label" id="date-label"></div>
  </div>
  <div class="refresh-controls" style="margin-left:auto;display:flex;align-items:center;gap:8px;">
    <button id="refresh-btn" class="refresh-btn" title="手動でデータを最新化">更新</button>
    <label style="display:flex;align-items:center;gap:6px;">
      <input type="checkbox" id="auto-refresh" checked>
      自動更新
    </label>
    <span id="refresh-status" style="font-size:12px;color:#54707a;"></span>
  </div>
</header>

<div id="legend-wrap"></div>
<div id="ticker-wrap"></div>

<div class="main-layout">
  <aside class="ranking-panel" id="ranking-panel"></aside>
  <div class="schedule-wrapper">
    <div class="schedule-flex" id="schedule-flex"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
