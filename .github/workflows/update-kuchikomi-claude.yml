name: Update kuchikomi.json with Claude Code

on:
  schedule:
    # 毎週月曜 00:01 JST（日曜 15:01 UTC）※更新済み
    - cron: '0 16 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン（PR 作成をスキップ）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: update-kuchikomi
  cancel-in-progress: false

jobs:
  update-kuchikomi:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate existing kuchikomi.json
        run: python scripts/update_kuchikomi.py --validate

      - name: Run Claude to update kuchikomi.json
        id: claude-update
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude \
            --model claude-sonnet-4-6 \
            --allowed-tools Bash,WebSearch,WebFetch,Edit,Write \
            --dangerously-skip-permissions \
            <<'PROMPT'
You are a repository automation assistant.

Goal:
Update `kuchikomi.json` in place based on:
- `.github/skills/update-kuchikomi/SKILL.md`
- `programs.json`
- the current `kuchikomi.json`

Requirements:
- Modify only `kuchikomi.json`
- Produce a valid JSON array
- Each object must contain exactly:
  - `title`
  - `sentiment`
  - `text`
- `sentiment` must be one of:
  - `positive`
  - `negative`
  - `mixed`
- `text` must:
  - start with a sentiment emoji
  - be concise
  - feel like a short social-media post
- Prefer 10–15 entries
- Preserve existing titles when possible
- Keep titles aligned with `programs.json`

Validation:
After editing the file, run:
`python scripts/update_kuchikomi.py --validate`

If validation fails, fix the file and rerun validation until it passes.
PROMPT

      - name: Validate updated kuchikomi.json
        run: python scripts/update_kuchikomi.py --validate

      - name: Check for changes
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- kuchikomi.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "kuchikomi.json has changed"
            git diff --stat -- kuchikomi.json
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: kuchikomi.json を自動更新'
          title: '📣 kuchikomi.json 自動更新'
          body: |
            GitHub Actions + Claude Code によって `kuchikomi.json` を更新しました。

            ### 確認事項
            - [ ] 口コミ内容が最新の反応を反映しているか
            - [ ] sentiment と絵文字が一致しているか
            - [ ] タイトルが `programs.json` の番組名と整合しているか

            ### 補足
            - 実行トリガー: schedule / workflow_dispatch
            - dry_run=true の場合、PR は作成されません
          branch: auto-update/kuchikomi
          delete-branch: true
          labels: |
            automated
            kuchikomi

      - name: Dry run summary
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run == 'true'
        run: |
          echo "dry_run=true のため PR 作成はスキップしました"
